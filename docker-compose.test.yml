# Isolated, full-stack c0 for integration testing: a throwaway Neo4j, a real
# Ollama for embeddings, and the c0 binary driving real commands against them.
# Nothing here touches your dev Neo4j (separate volumes, no published ports).
#
#   ./scripts/docker-test.sh
# or
#   docker compose -f docker-compose.test.yml up --build \
#     --abort-on-container-exit --exit-code-from c0-test
name: c0-integration-test

services:
  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=none
    tmpfs:
      - /data   # ephemeral: every run starts from an empty graph

  ollama:
    image: ollama/ollama:latest
    volumes:
      - c0-test-ollama:/root/.ollama   # cache pulled models across runs

  c0-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    depends_on:
      - neo4j
      - ollama
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=
      - NEO4J_PASSWORD=
      - OLLAMA_HOST=http://ollama:11434
    command: ["bash", "scripts/integration-test.sh"]

volumes:
  c0-test-ollama:
